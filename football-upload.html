async function go(day) {
  const btn  = document.getElementById('b-' + day);
  const st   = document.getElementById('st-' + day);
  const card = document.getElementById('card-' + day);

  btn.disabled = true;
  btn.textContent = '⏳ جاري الرفع...';
  st.textContent  = '⏳ جاري الرفع على Firebase...';
  st.style.color  = '#fbbf24';

  try {
    const docRef = db.collection("quizzes_pool").doc("day_" + day);
    const doc    = await docRef.get();
    let variations = doc.exists ? (doc.data().variations || {}) : {};
    variations["0"] = { questions: Q[day] };
    await docRef.set({
      variations,
      updatedAt: firebase.firestore.FieldValue.serverTimestamp(),
      dayNumber: day
    }, { merge: true });

    st.textContent   = '✅ تم! ' + Q[day].length + ' سؤال محفوظ بنجاح';
    st.style.color   = '#4ade80';
    card.className   = 'card done';
    btn.textContent  = '✅ تم الرفع';
    btn.style.background = 'rgba(34,197,94,0.2)';
  } catch(err) {
    st.textContent  = '❌ خطأ: ' + err.message;
    st.style.color  = '#f87171';
    card.className  = 'card fail';
    btn.disabled    = false;
    btn.textContent = '🔄 إعادة المحاولة';
  }
}

async function uploadAll() {
  const btn = document.getElementById('btn-all');
  btn.disabled = true;
  btn.textContent = '⏳ جاري رفع الكل...';
  for (const d of [11,12,13,14]) {
    await go(d);
    await new Promise(r => setTimeout(r, 500));
  }
  btn.textContent = '✅ تم رفع الجولات الأربعة بنجاح!';
}
